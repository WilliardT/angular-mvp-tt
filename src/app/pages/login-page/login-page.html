<form
  action=""
  class="login-form"
  [formGroup]="form"
  (ngSubmit)="onSubmit($event)"
>
  <h1 class="h1 login-form__title">Вход</h1>

  <label class="login-form__label">
    Telegram логин

    <input
      class="login-form__input"
      type="text"
      placeholder="Введите логин"
      formControlName="username"
    >
  </label>

  <label class="login-form__label">
    Пароль

    <span class="login-form__password-input">
      <input
       class="login-form__input"
       [type]="isPasswordVisible() ? 'text' : 'password'"
       placeholder="Введите пароль"
       formControlName="password"
      >

      <button
        class="login-form__password-eye-btn"
        [class.active]="isPasswordVisible()"
        (click)="isPasswordVisible.set(!isPasswordVisible())"
      >
        <tui-icon icon="@tui.eye-off" />
      </button>
    </span>
  </label>


  <button
    class="btn btn-shadow"
    type="submit"
  >
    Войти
  </button>

</form>

<img
  src="/assets/svg/logo-big.svg"
  alt="logo"
>
